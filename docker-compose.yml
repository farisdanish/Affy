services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - /app/node_modules
      # Exclude frontend directory from being watched by backend
      - /app/client
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/affydb
      - JWT_SECRET=local-jwt-secret
      - APP_PUBLIC_URL=http://localhost:3000
    command: node server/server.js
    depends_on:
      - mongo

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true # Required for hot reloading in some OS/Docker setups
      - REACT_APP_API_URL=http://localhost:5000
    depends_on:
      - backend

  mongo:
    image: mongo:6-jammy
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
